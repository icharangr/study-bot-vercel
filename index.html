function Ring({pct,size=80,stroke=6,color="#22c55e",label,sub}){
  const r=(size-stroke*2)/2,c=2*Math.PI*r,d=(pct/100)*c;
  return(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
      <div style={{position:"relative",width:size,height:size}}>
        <svg width={size} height={size} style={{transform:"rotate(-90deg)",position:"absolute"}}>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e293b" strokeWidth={stroke}/>
          <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
            strokeDasharray={`${d} ${c}`} strokeLinecap="round" style={{transition:"stroke-dasharray 0.7s ease"}}/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:size>70?16:12,fontWeight:700,color,fontFamily:"'JetBrains Mono',monospace"}}>{pct}%</span>
          {sub&&<span style={{fontSize:9,color:"#475569",marginTop:1}}>{sub}</span>}
        </div>
      </div>
      {label&&<span style={{fontSize:10,color:"#64748b",fontWeight:600}}>{label}</span>}
    </div>
  );
}

function Countdown({label,date,color,icon}){
  const days=daysUntil(date),m=Math.floor(days/30),r=days%30;
  return(
    <div style={{flex:1,background:"#0a1628",border:`1px solid ${color}22`,borderRadius:12,padding:"12px",overflow:"hidden",position:"relative"}}>
      <div style={{position:"absolute",top:-8,right:-8,fontSize:44,opacity:0.06}}>{icon}</div>
      <div style={{fontSize:9,color:"#334155",letterSpacing:1,textTransform:"uppercase",marginBottom:4}}>{label}</div>
      <div style={{display:"flex",alignItems:"baseline",gap:3}}>
        <span style={{fontSize:28,fontWeight:700,color,fontFamily:"'JetBrains Mono',monospace",lineHeight:1}}>{days}</span>
        <span style={{fontSize:11,color:"#475569"}}>days</span>
      </div>
      <div style={{fontSize:10,color:"#334155",marginTop:3}}>{m>0?`${m}m ${r}d left`:date.toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</div>
      <div style={{marginTop:6,height:2,background:"#1e293b",borderRadius:1}}>
        <div style={{height:"100%",width:`${Math.min(100,Math.max(2,100-days/365*100))}%`,background:color,borderRadius:1}}/>
      </div>
    </div>
  );
}

function StreakBar({streak}){
  const color=streak>=30?"#fbbf24":streak>=14?"#f97316":streak>=7?"#fb923c":"#ef4444";
  const next=streak<7?7:streak<14?14:streak<30?30:null;
  const msg=streak===0?"Start your streak today!":next?`${next-streak} more days to ${next===7?"⚡":next===14?"💎":"👑"} badge`:"You're a legend 👑";
  return(
    <div style={{background:"linear-gradient(135deg,#150800,#0a0400)",border:`1px solid ${color}33`,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
      <span className={streak>0?"flame":""} style={{fontSize:30}}>{streak>0?"🔥":"💤"}</span>
      <div style={{flex:1}}>
        <div style={{display:"flex",alignItems:"baseline",gap:6}}>
          <span style={{fontSize:24,fontWeight:700,color,fontFamily:"'JetBrains Mono',monospace"}}>{streak}</span>
          <span style={{fontSize:11,color:"#6b3a00"}}>day streak</span>
        </div>
        <div style={{fontSize:10,color:"#6b3a00",marginTop:1}}>{msg}</div>
      </div>
      <div style={{textAlign:"right"}}>
        <div style={{fontSize:9,color:"#6b3a00"}}>Best</div>
        <div style={{fontSize:16,fontWeight:700,color,fontFamily:"'JetBrains Mono',monospace"}}>{ls.get("best_streak",0)}</div>
      </div>
    </div>
  );
}

    const carry=day===todayName?carried.map(t=>({...t,carried:true})):[];
    return [...carry,...base];
  },[schedule,carried,todayName]);

  const getProgress=useCallback(day=>{
    const tasks=getSchedule(day).filter(t=>["gate","dsa","upsc","study"].includes(t.cat));
    const n=tasks.filter(t=>done[t.id]).length;
    return{done:n,total:tasks.length,pct:tasks.length?Math.round(n/tasks.length*100):0};
  },[getSchedule,done]);

  const toggleTask=id=>{
    const nd={...done,[id]:!done[id]};setDone(nd);
    const tasks=getSchedule(todayName).filter(t=>["gate","dsa","upsc","study"].includes(t.cat));
    if(tasks.every(t=>nd[t.id])){
      const ns=streak+1;setStreak(ns);
      if(ns>ls.get("best_streak",0))ls.set("best_streak",ns);
      ls.set("last_active",tKey);
      showToast(`🔥 All done! Streak: ${ns} days!`);
    }else showToast(done[id]?"Unmarked":"✅ Done!");
  };

  // ── Apply AI actions ──────────────────────────────────────────
  const applyActions=useCallback((actions)=>{
    if(!Array.isArray(actions))return;
    actions.forEach(a=>{
      switch(a.type){
        case "add_task":{
          const t={id:genId(),time:a.time||"",task:a.task,cat:a.cat||"study",icon:a.icon||"➕"};
          setSchedule(p=>({...p,[a.day||todayName]:[...(p[a.day||todayName]||[]),t]}));
          showToast(`✅ Added "${a.task}" to ${a.day||"today"}`);break;
        }
        case "remove_task":
          setSchedule(p=>({...p,[a.day||todayName]:(p[a.day||todayName]||[]).filter(t=>!t.task.toLowerCase().includes(a.keyword.toLowerCase()))}));
          showToast(`🗑️ Removed from ${a.day||"today"}`);break;
        case "edit_task":
          setSchedule(p=>({...p,[a.day||todayName]:(p[a.day||todayName]||[]).map(t=>t.task.toLowerCase().includes(a.keyword.toLowerCase())?{...t,...(a.newTime&&{time:a.newTime}),...(a.newTask&&{task:a.newTask})}:t)}));
          showToast(`✏️ Updated task`);break;
        case "replace_day":{
          const tasks=(a.tasks||[]).map(t=>({id:genId(),time:t.time||"",task:t.task,cat:t.cat||"study",icon:t.icon||"📌"}));
          setSchedule(p=>({...p,[a.day||todayName]:tasks}));
          showToast(`📅 ${a.day||"Today"} schedule updated!`);break;
        }
        case "add_goal":
          setMonthlyGoals(p=>[...p,{id:genId(),text:a.text,cat:a.cat||"study"}]);
          showToast("🎯 Goal added!");break;
        case "remove_goal":
          setMonthlyGoals(p=>p.filter(g=>!g.text.toLowerCase().includes(a.keyword.toLowerCase())));
          showToast("🗑️ Goal removed");break;
        case "replace_goals":
          setMonthlyGoals((a.goals||[]).map(g=>({id:genId(),text:g.text||g,cat:g.cat||"study"})));
          showToast("🎯 Goals updated!");break;
        case "update_targets":
          setDailyTargets(p=>({...p,...a.targets}));
          showToast("📊 Targets updated!");break;
        case "set_weekly_plan":
          setWeeklyPlan(a.plan);setTab("planner");
          showToast("🗓️ Weekly plan updated!");break;
        case "carry_forward":{
          const pending=getSchedule(todayName).filter(t=>["gate","dsa","upsc","study"].includes(t.cat)&&!done[t.id]);
          if(pending.length){const tmrw=new Date(today);tmrw.setDate(today.getDate()+1);ls.set("carried_"+tmrw.toISOString().split("T")[0],pending.map(t=>({...t,id:t.id+"_co",task:"↩ "+t.task})));showToast(`📋 ${pending.length} tasks carried forward`);}
          break;
        }
        case "log_upsc": setUpscCount(p=>p+(a.count||1));showToast(`📖 +${a.count||1} UPSC lecture`);break;
        case "log_dsa":  setDsaCount(p=>p+(a.count||1));showToast(`💻 +${a.count||1} DSA problem`);break;
        default:break;
      }
    });
  },[getSchedule,done,todayName,today,tKey]);

  // ── Send message ──────────────────────────────────────────────
  const sendMsg=async(text)=>{
    if(!text.trim()||loading)return;
    const userText=text.trim();
    setInput("");
    setMessages(p=>[...p,{role:"user",text:userText}]);
    setLoading(true);

    const prog=getProgress(todayName);
    const sched=getSchedule(todayName);
    const doneTasks=sched.filter(t=>done[t.id]).map(t=>t.task);
    const pendingTasks=sched.filter(t=>["gate","dsa","upsc","study"].includes(t.cat)&&!done[t.id]).map(t=>t.task);

    const systemPrompt=`You are Charan's personal AI study assistant. You can DYNAMICALLY CHANGE everything in his study app.

CURRENT STATE:
Date: ${todayName}, ${fmtFull(today)}
Progress: ${prog.done}/${prog.total} tasks (${prog.pct}%)
Completed: ${doneTasks.join(", ")||"None"}
Pending: ${pendingTasks.join(", ")||"All done!"}
Streak: ${streak} days | UPSC: ${upscCount}/60 | DSA: ${dsaCount}
Days to GATE: ${daysUntil(EXAM_DATES.GATE)} | Days to UPSC: ${daysUntil(EXAM_DATES.UPSC)}
Daily targets: ${JSON.stringify(dailyTargets)}
Monthly goals: ${monthlyGoals.map(g=>g.text).join(" | ")}
Today's schedule: ${JSON.stringify((schedule[todayName]||[]).map(t=>({time:t.time,task:t.task,cat:t.cat})))}

WHAT YOU CAN DO — after your response include actions in this format:
<<<ACTIONS>>>
[array of action objects]
<<<END>>>

AVAILABLE ACTIONS:
{"type":"add_task","day":"Monday","time":"5:00 AM","task":"Yoga","cat":"routine","icon":"🧘"}
{"type":"remove_task","day":"Monday","keyword":"Yoga"}
{"type":"edit_task","day":"Monday","keyword":"DSA","newTime":"7:00 PM","newTask":"Striver DSA – 6 Problems"}
{"type":"replace_day","day":"Monday","tasks":[{"time":"6 AM","task":"Badminton","cat":"routine","icon":"🏸"},...]}
{"type":"add_goal","text":"Complete OS by May","cat":"gate"}
{"type":"remove_goal","keyword":"Binary Search"}
{"type":"replace_goals","goals":[{"text":"New goal 1","cat":"gate"},{"text":"New goal 2","cat":"upsc"}]}
{"type":"update_targets","targets":{"gate":"4 hrs/day","dsa":"5 problems/day","upsc":"6 hrs/day"}}
{"type":"set_weekly_plan","plan":"Monday: ...\nTuesday: ..."}
{"type":"carry_forward"}
{"type":"log_upsc","count":1}
{"type":"log_dsa","count":4}

Be concise (3-4 lines), warm, and practical. Only include <<<ACTIONS>>> if changes are needed.`;

    try{
      const res=await fetch(API_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          system:systemPrompt,
          max_tokens:2000,
          messages:[
            ...messages.slice(-8).map(m=>({role:m.role==="bot"?"assistant":"user",content:m.text})),
            {role:"user",content:userText}
          ]
        })
      });

      if(!res.ok){
        const err=await res.text();
        throw new Error(`HTTP ${res.status}: ${err}`);
      }

      const data=await res.json();
      if(data.error) throw new Error(data.error+(data.details?": "+data.details:""));

      let reply=data.content?.[0]?.text||"No response.";

      const actionMatch=reply.match(/<<<ACTIONS>>>([\s\S]*?)<<<END>>>/);
      if(actionMatch){
        try{
          const actions=JSON.parse(actionMatch[1].trim());
          reply=reply.replace(/<<<ACTIONS>>>[\s\S]*?<<<END>>>/,"").trim();
          applyActions(actions);
        }catch(e){console.warn("Action parse error:",e);}
      }

      if(userText.toLowerCase().includes("night summary")||userText.toLowerCase().includes("carry forward")){
        applyActions([{type:"carry_forward"}]);
        ls.set("last_active",tKey);
      }

      setMessages(p=>[...p,{role:"bot",text:reply}]);

  };

              <Ring pct={dsaPct} size={76} color="#a855f7" label="DSA" sub={`${dsaCount}/100`}/>
            </div>
            <div style={{background:"#0a1628",borderRadius:14,border:"1px solid #1e293b",padding:14,marginBottom:14}}>
              <div style={{fontSize:10,color:"#334155",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>This Week</div>
              {DAYS.slice(1).concat(DAYS[0]).map(d=>{
                const p=getProgress(d),isT=d===todayName;
                return(
                  <div key={d} style={{display:"flex",alignItems:"center",gap:10,marginBottom:7}}>
                    <div style={{width:28,fontSize:11,color:isT?"#22c55e":"#334155",fontWeight:isT?700:400}}>{d.slice(0,3)}</div>
                    <div style={{flex:1,height:5,background:"#0f172a",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${p.pct}%`,background:isT?"#22c55e":p.pct===100?"#06b6d4":"#1e3050",borderRadius:3,transition:"width 0.5s"}}/></div>
                    <div style={{width:32,fontSize:11,color:"#334155",textAlign:"right",fontFamily:"'JetBrains Mono',monospace"}}>{p.pct}%</div>
                  </div>
                );
              })}
            </div>
            <div style={{background:"#0a1628",borderRadius:14,border:"1px solid #1e293b",padding:14}}>
              <div style={{fontSize:10,color:"#334155",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Daily Targets</div>
              {[{l:"GATE",v:dailyTargets.gate,c:"#22c55e",i:"📚"},{l:"Striver DSA",v:dailyTargets.dsa,c:"#a855f7",i:"💻"},{l:"UPSC Polity",v:dailyTargets.upsc,c:"#f97316",i:"🇮🇳"}].map(t=>(
                <div key={t.l} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #0f172a"}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}><span>{t.i}</span><span style={{fontSize:13,color:"#64748b"}}>{t.l}</span></div>
                  <span style={{fontSize:13,color:t.c,fontWeight:700,fontFamily:"'JetBrains Mono',monospace"}}>{t.v}</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="badges"&&(
          <div className="fade-in">
            <div style={{marginBottom:14}}><StreakBar streak={streak}/></div>
            <div style={{fontSize:10,color:"#334155",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Earned ({earned.length}/{ALL_BADGES.length})</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
              {earned.map(b=>(
                <div key={b.id} style={{background:"linear-gradient(135deg,#1a1a00,#2a1500)",border:"1px solid #fbbf2444",borderRadius:12,padding:"12px",textAlign:"center"}}>
                  <div style={{fontSize:28,marginBottom:4}}>{b.icon}</div>
                  <div style={{fontSize:12,fontWeight:700,color:"#fbbf24"}}>{b.label}</div>
                  <div style={{fontSize:10,color:"#78350f",marginTop:2}}>{b.desc}</div>
                </div>
              ))}
              {earned.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"30px",color:"#1e3050"}}><div style={{fontSize:28,marginBottom:6}}>🏆</div><div style={{fontSize:13}}>Complete tasks to earn badges!</div></div>}
            </div>
            <div style={{fontSize:10,color:"#334155",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Locked ({ALL_BADGES.length-earned.length})</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
              {ALL_BADGES.filter(b=>!earned.find(e=>e.id===b.id)).map(b=>(
                <div key={b.id} style={{background:"#0a1628",border:"1px solid #1e293b",borderRadius:12,padding:"12px",textAlign:"center",opacity:0.4}}>
                  <div style={{fontSize:28,marginBottom:4,filter:"grayscale(1)"}}>{b.icon}</div>
                  <div style={{fontSize:12,fontWeight:700,color:"#475569"}}>{b.label}</div>
                  <div style={{fontSize:10,color:"#1e293b",marginTop:2}}>{b.desc}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {tab==="planner"&&(
          <div className="fade-in">
            <div style={{background:"#0a1628",border:"1px solid #1e3050",borderRadius:14,padding:14,marginBottom:12}}>
              <div style={{fontSize:13,color:"#60a5fa",fontWeight:600,marginBottom:6}}>🧠 AI Weekly Planner</div>
              <div style={{fontSize:12,color:"#334155",lineHeight:1.7,marginBottom:12}}>Generates a personalized Mon–Sun plan based on your progress, exam countdown, and missed tasks.</div>
              <button onClick={generateWeeklyPlan} disabled={generatingPlan} style={{width:"100%",padding:"12px",background:generatingPlan?"#0a1628":"linear-gradient(135deg,#0a2a0a,#152a15)",border:"1px solid #22c55e44",borderRadius:10,color:generatingPlan?"#334155":"#22c55e",fontSize:13,fontWeight:600,cursor:generatingPlan?"not-allowed":"pointer",fontFamily:"inherit"}}>
                {generatingPlan?"⏳ Generating...":"🗓️ Generate This Week's Plan"}
              </button>
            </div>
            {weeklyPlan?(
              <div style={{background:"#0a1628",border:"1px solid #1e3050",borderRadius:14,padding:14}}>
                <div style={{fontSize:10,color:"#334155",letterSpacing:1,textTransform:"uppercase",marginBottom:10}}>Your Plan — {today.toLocaleDateString("en-IN",{month:"long",year:"numeric"})}</div>
                <div style={{fontSize:13,color:"#94a3b8",lineHeight:1.9,whiteSpace:"pre-wrap"}}>{weeklyPlan}</div>
              </div>
            ):(
              <div style={{textAlign:"center",padding:"40px 20px",color:"#1e3050"}}>
                <div style={{fontSize:40,marginBottom:10}}>🗓️</div>
                <div style={{fontSize:13}}>No plan yet. Generate one above!</div>
              </div>
            )}
          </div>
        )}

        {tab==="goals"&&(
          <div className="fade-in">
            <div style={{fontSize:10,color:"#334155",letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>Monthly Goals</div>
            {monthlyGoals.map((g,i)=>{
              const cat=CAT[g.cat]||CAT.study;
              return(
                <div key={g.id} style={{padding:"12px 14px",marginBottom:8,background:cat.bg,borderRadius:12,border:`1px solid ${cat.border}`,animation:`fadeIn 0.3s ease ${i*0.06}s both`}}>
                  <div style={{display:"flex",alignItems:"flex-start",gap:8}}>
                    <div style={{width:8,height:8,borderRadius:"50%",background:cat.accent,flexShrink:0,marginTop:4}}/>
                    <div style={{fontSize:13,color:"#e2e8f0",lineHeight:1.5}}>{g.text}</div>
                  </div>
                  <div style={{marginTop:6}}><span style={{fontSize:9,padding:"2px 7px",borderRadius:6,background:cat.accent+"22",color:cat.accent}}>{cat.label}</span></div>
                </div>
              );
            })}
            <div style={{marginTop:12,padding:12,background:"#0a1628",borderRadius:12,border:"1px solid #1e3050"}}>
              <div style={{fontSize:12,color:"#60a5fa",marginBottom:6,fontWeight:600}}>💬 Change goals via chat</div>
              <div style={{fontSize:11,color:"#334155",lineHeight:1.8}}>"Add goal: Complete OS by May 5"<br/>"Remove the Binary Search goal"<br/>"Replace all goals with..."</div>
            </div>
            <div style={{marginTop:12,padding:14,background:"#1f0d0d",borderRadius:14,border:"1px solid #3b1f1f"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                <div>
                  <div style={{fontSize:13,fontWeight:700,color:"#f97316"}}>🇮🇳 UPSC Lecture Counter</div>
                  <div style={{fontSize:10,color:"#7f1d1d",marginTop:2}}>Target: 60 by April 30</div>
                </div>
                <div style={{fontSize:26,fontWeight:700,color:"#f97316",fontFamily:"'JetBrains Mono',monospace"}}>{upscCount}<span style={{fontSize:14,color:"#7f1d1d"}}>/60</span></div>
              </div>
              <div style={{height:6,background:"#3b1f1f",borderRadius:3,overflow:"hidden",marginBottom:10}}>
                <div style={{height:"100%",width:`${upscPct}%`,background:"linear-gradient(90deg,#f97316,#fb923c)",borderRadius:3,transition:"width 0.5s"}}/>
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>{setUpscCount(p=>p+1);showToast("📖 Lecture logged!");}} style={{flex:1,padding:"9px",background:"#3b1f1f",border:"1px solid #f9731444",borderRadius:10,color:"#f97316",fontSize:12,fontWeight:600,cursor:"pointer",fontFamily:"inherit"}}>+ Watched a Lecture</button>
                <button onClick={()=>setUpscCount(p=>Math.max(0,p-1))} style={{padding:"9px 13px",background:"transparent",border:"1px solid #3b1f1f",borderRadius:10,color:"#7f1d1d",cursor:"pointer",fontFamily:"inherit"}}>−</button>
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
